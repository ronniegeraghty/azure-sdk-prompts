# Task: Pagination — List Key Vault Secrets (Python)
# Source: prompts/key-vault/data-plane/python/pagination-list-secrets.prompt.md
# Hyoka ID: key-vault-dp-python-pagination
id: key-vault-dp-python-pagination
name: Pagination - List Key Vault Secrets Python
description: |
  Can a developer paginate through a large list of Key Vault secrets
  using the Python SDK?

tags:
  - key-vault
  - data-plane
  - python
  - pagination
  - intermediate

inputs:
  prompt: |
    Write a Python script that lists all secrets in an Azure Key Vault that contains
    hundreds of secrets. The script should:
    1. Use SecretClient with DefaultAzureCredential
    2. Iterate through secrets using the ItemPaged pattern
    3. Process secrets in pages using by_page()
    4. Print the name, content type, and created date of each secret
    5. Filter to show only enabled secrets

    I need to understand how the azure-keyvault-secrets SDK handles pagination
    for large vaults. Show required pip packages.

# Task-level graders — per-prompt evaluation criteria
graders:
  # Text graders for key API usage
  - type: text
    name: pagination_api_usage
    config:
      contains:
        - "list_properties_of_secrets"
        - "SecretClient"
      contains_cs:
        - "DefaultAzureCredential"

  - type: text
    name: pagination_patterns
    config:
      contains:
        - "by_page"

  # LLM grader for nuanced criteria
  - type: prompt
    name: pagination_criteria_judge
    config:
      model: claude-sonnet-4.5
      prompt: |
        You are evaluating Azure Key Vault Python SDK pagination code.
        Check each criterion independently. For each, call set_waza_grade_pass or
        set_waza_grade_fail with the criterion name as description.

        ## Prompt-Specific Criteria

        1. **list_properties_of_secrets** — Code calls
           client.list_properties_of_secrets() which returns an ItemPaged object.
           (description: "list_properties_method")

        2. **Direct iteration** — Code shows iterating directly with
           `for secret in client.list_properties_of_secrets()`.
           (description: "direct_iteration")

        3. **Page-by-page iteration** — Code shows using .by_page() for
           page-level iteration.
           (description: "by_page_iteration")

        4. **Continuation token** — Code shows or mentions continuation token
           support for resumable listing.
           (description: "continuation_token")

        5. **SecretProperties attributes** — Code accesses secret properties
           like name, content_type, enabled, and created_on.
           (description: "secret_properties_attrs")

        6. **max_page_size** — Code shows or mentions the max_page_size parameter
           for controlling page size.
           (description: "max_page_size_param")

        7. **Error handling** — Code includes error handling with HttpResponseError.
           (description: "error_handling")

        Make exactly 7 tool calls (one per criterion).
