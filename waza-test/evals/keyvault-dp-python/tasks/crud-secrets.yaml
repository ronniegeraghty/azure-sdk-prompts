# Task: CRUD Secrets — Azure Key Vault (Python)
# Source: prompts/key-vault/data-plane/python/crud-secrets.prompt.md
# Hyoka ID: key-vault-dp-python-crud
id: key-vault-dp-python-crud
name: CRUD Secrets - Azure Key Vault Python
description: |
  Can a developer create, read, update, and delete secrets in Azure Key Vault
  using the Python SDK? Tests the full secret lifecycle including soft-delete.

tags:
  - key-vault
  - data-plane
  - python
  - crud
  - getting-started
  - basic

inputs:
  prompt: |
    Write a script that performs all four CRUD operations on Azure Key Vault secrets:
    1. Create a new secret called "my-secret" with value "my-secret-value"
    2. Read the secret back and print its value
    3. Update the secret to a new value "updated-value"
    4. Delete the secret and purge it (soft-delete enabled vault)

    Use DefaultAzureCredential for authentication. Include proper error handling
    and show required pip packages.

# Task-level graders — replicate hyoka's per-prompt evaluation criteria
graders:
  # Text graders for deterministic keyword checks
  - type: text
    name: crud_api_coverage
    config:
      contains:
        - "SecretClient"
        - "set_secret"
        - "get_secret"
      contains_cs:
        - "DefaultAzureCredential"

  - type: text
    name: crud_delete_operations
    config:
      contains:
        - "begin_delete_secret"
        - "purge_deleted_secret"

  # LLM grader for nuanced per-prompt criteria
  - type: prompt
    name: crud_criteria_judge
    config:
      model: claude-sonnet-4.5
      prompt: |
        You are evaluating Azure Key Vault Python SDK code for CRUD secret operations.
        Check each criterion independently. For each, call set_waza_grade_pass or
        set_waza_grade_fail with the criterion name as description.

        ## Prompt-Specific Criteria

        1. **SecretClient setup** — Code creates a SecretClient with vault URL and
           credential (DefaultAzureCredential).
           (description: "secret_client_setup")

        2. **CRUD operations** — All four operations are present: set_secret(),
           get_secret(), and update via set_secret() with same name, plus delete.
           (description: "crud_operations_complete")

        3. **Soft-delete handling** — Code handles soft-delete properly: uses
           begin_delete_secret() (not delete_secret()), waits for delete to
           complete before purging, then calls purge_deleted_secret().
           (description: "soft_delete_handling")

        4. **Exception handling** — Code handles ResourceNotFoundError or
           HttpResponseError appropriately.
           (description: "exception_handling")

        5. **Package installation** — Shows pip install for azure-keyvault-secrets
           and azure-identity.
           (description: "package_installation")

        Make exactly 5 tool calls (one per criterion).
